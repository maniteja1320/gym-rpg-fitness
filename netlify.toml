[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback (Vite client app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker should not be cached aggressively by the CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
